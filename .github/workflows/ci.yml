# .github/workflows/ci.yml
#
# Three jobs:
#   1. test   — pytest on every push + PR
#   2. docker — build + push to GHCR (push to main only, after tests pass)
#   3. deploy - (after docker job)

name: CI/CD — Test + Build + Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── JOB 1: test ─────────────────────────────────────────────────────────────
  test:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Train fraud detection model
        run: python train_and_save_model.py

      - name: Run pytest
        run: pytest tests/ -v


  # ── JOB 2: docker ───────────────────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/fraud-api
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/fraud-api:main
            ghcr.io/${{ github.repository_owner }}/fraud-api:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ── JOB 3: deploy ────────────────────────────────────────────────────────────

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: docker           # ← wait for image to be pushed first
    if: github.event_name == 'push'

    steps:
      - name: Trigger Railway Deploy
        run: echo "Railway auto deploy triggered"

  # ── JOB 4: verify ────────────────────────────────────────────────────────────
  #
  # Runs after the deploy job.
  # Hits the health endpoint and the /predict endpoint from the CI runner.
  # If either fails — the whole pipeline fails and the team is notified.
  #
  # This is the difference between "the deploy commands ran" and
  # "the API is actually alive and serving predictions correctly".

  verify:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event_name == 'push'

    steps:

      # Wait for Railway deployment (slightly longer than VM)
      - name: Wait for API to start
        run: sleep 20

      # Health check
      - name: Health check
        run: |
          echo "Checking health endpoint..."
          curl --fail --silent --show-error \
            ${{ secrets.RAILWAY_URL }}/
          echo ""
          echo "Health check passed."

      # Smoke test
      - name: Smoke test — predict endpoint
        run: |
          echo "Running smoke test against /predict ..."

          RESPONSE=$(curl --fail --silent --show-error \
            -X POST ${{ secrets.RAILWAY_URL }}/predict \
            -H "Content-Type: application/json" \
            -d '{"amount": 8500, "time_of_day": 2.3, "merchant_risk": 0.92}')

          echo "Response: ${RESPONSE}"

          echo "${RESPONSE}" | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          assert data['is_fraud'] == True, f'Expected fraud=True, got: {data}'
          assert data['fraud_probability'] > 0.5, f'Expected prob > 0.5, got: {data}'
          print('Smoke test PASSED — model is serving correct predictions.')
          "
