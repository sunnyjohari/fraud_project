# .github/workflows/ci.yml
#
# Three jobs:
#   1. test   — pytest on every push + PR
#   2. docker — build + push to GHCR (push to main only, after tests pass)
#   3. deploy — SSH into server, pull latest image, restart (after docker job)
#
# GitHub Secrets required for job 3 (set in repo Settings → Secrets):
#   SSH_HOST        — your server's IP address
#   SSH_USER        — ssh username (root for DigitalOcean)
#   SSH_PRIVATE_KEY — contents of your private key (~/.ssh/id_rsa)

name: CI/CD — Test + Build + Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # ── JOB 1: test ─────────────────────────────────────────────────────────────
  test:
    name: Run API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest httpx

      - name: Train fraud detection model
        run: python train_and_save_model.py

      - name: Run pytest
        run: pytest tests/ -v


  # ── JOB 2: docker ───────────────────────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push'

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/fraud-api
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ── JOB 3: deploy ────────────────────────────────────────────────────────────
  # SSH into the server, pull the new image, restart the container.
  # Runs only after the docker job succeeds.
  #
  # Required GitHub Secrets (Settings → Secrets and variables → Actions):
  #   SSH_HOST        — server IP address  e.g. 143.198.xxx.xxx
  #   SSH_USER        — ssh user           e.g. root
  #   SSH_PRIVATE_KEY — private key text   paste full contents of ~/.ssh/id_rsa

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: docker           # ← wait for image to be pushed first
    if: github.event_name == 'push'

    steps:
      - name: Trigger Railway Deploy
        run: echo "🚀 Railway auto deploy triggered"