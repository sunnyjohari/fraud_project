name: Fraud Detection ML Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  test:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        run: pytest tests/ -v

  train:
    name: Train & Save Model
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Train model
        run: python train_and_save_model.py

      - name: Upload model artifact
        uses: actions/upload-artifact@v3
        with:
          name: fraud-model
          path: fraud_model.pkl

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: train
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v3

      - name: Download model artifact
        uses: actions/download-artifact@v3
        with:
          name: fraud-model

      - name: Build Docker image
        run: docker build -t fraud-detection:latest .
